<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Backoffice{% endblock title %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07111f;
      --bg-soft: rgba(11, 26, 47, 0.74);
      --panel: rgba(10, 22, 39, 0.78);
      --panel-strong: rgba(6, 16, 30, 0.92);
      --line: rgba(148, 163, 184, 0.2);
      --line-strong: rgba(249, 115, 22, 0.34);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #fb923c;
      --accent-2: #2dd4bf;
      --danger: #f87171;
      --shadow: 0 24px 80px rgba(2, 8, 23, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(45, 212, 191, 0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(251, 146, 60, 0.15), transparent 24%),
        linear-gradient(180deg, #08111e 0%, #050c18 100%);
    }

    body.standalone-layout {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1380px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--bg-soft);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .eyebrow {
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-2);
    }

    .brand strong {
      font-family: "Fraunces", serif;
      font-size: clamp(1.6rem, 2vw, 2.25rem);
      line-height: 1;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a,
    .nav button,
    .button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.56);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .nav a:hover,
    .nav button:hover,
    .button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: rgba(251, 146, 60, 0.1);
    }

    .button-accent {
      border-color: rgba(251, 146, 60, 0.5);
      background: linear-gradient(135deg, rgba(251, 146, 60, 0.18), rgba(45, 212, 191, 0.12));
    }

    .button-danger {
      border-color: rgba(248, 113, 113, 0.45);
      color: #fecaca;
    }

    .stack {
      display: grid;
      gap: 20px;
      margin-top: 22px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .panel-body {
      padding: 22px;
    }

    .hero {
      display: grid;
      gap: 12px;
      padding: 28px;
      border: 1px solid rgba(45, 212, 191, 0.18);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(251, 146, 60, 0.14), rgba(45, 212, 191, 0.08));
    }

    .hero h1,
    .hero h2,
    .section-title {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(1.75rem, 2.3vw, 3rem);
      line-height: 1;
    }

    .section-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .section-heading p,
    .muted {
      margin: 0;
      color: var(--muted);
    }

    .notice,
    .error {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
    }

    .notice {
      color: #ccfbf1;
      background: rgba(13, 148, 136, 0.14);
      border-color: rgba(45, 212, 191, 0.28);
    }

    .error {
      color: #fee2e2;
      background: rgba(185, 28, 28, 0.18);
      border-color: rgba(248, 113, 113, 0.3);
    }

    .metric-grid,
    .art-grid,
    .split-grid {
      display: grid;
      gap: 18px;
    }

    .metric-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .art-grid {
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    }

    .split-grid {
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      align-items: start;
    }

    .metric-card,
    .art-card,
    .info-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(8, 18, 33, 0.82);
    }

    .metric-card strong {
      display: block;
      margin-top: 8px;
      font-size: 2rem;
      font-family: "Fraunces", serif;
    }

    .art-card img,
    .art-frame img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.7);
    }

    .art-card h3,
    .info-card h3 {
      margin: 14px 0 6px;
      font-size: 1rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 6px 10px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .art-frame {
      padding: 20px;
      border-radius: 28px;
      border: 1px solid rgba(251, 146, 60, 0.22);
      background: rgba(5, 15, 27, 0.9);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.78);
      color: var(--text);
      padding: 14px 16px;
      font: inherit;
    }

    .field textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.55;
    }

    .actions,
    .pager {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-row input {
      flex: 1 1 280px;
      min-width: 0;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      padding: 12px 16px;
      font: inherit;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .timeline-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .login-shell {
      width: min(100%, 560px);
      padding: 24px;
    }

    .login-card {
      width: min(480px, 100%);
      padding: 30px;
      border-radius: 32px;
      border: 1px solid var(--line);
      background: rgba(6, 16, 30, 0.92);
      box-shadow: var(--shadow);
    }

    @media (max-width: 920px) {
      .split-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
  {% block head %}{% endblock head %}
</head>
<body{% if hide_nav | default(value=false) == true %} class="standalone-layout"{% endif %}>
  {% if hide_nav | default(value=false) != true %}
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="eyebrow">Imaginary Gallery</span>
        <strong>Backoffice</strong>
      </div>
      <nav class="nav">
        <a href="/backoffice">Dashboard</a>
        <a href="/backoffice/arts">Library</a>
        <a href="/backoffice/mixes">Mixes</a>
        <a href="/" target="_blank" rel="noreferrer">Public Gallery</a>
        <form method="post" action="/backoffice/logout">
          <button type="submit">Log Out</button>
        </form>
      </nav>
    </header>
    <main class="stack">
  {% endif %}

  {% block content %}{% endblock content %}

  {% if hide_nav | default(value=false) != true %}
    </main>
  </div>
  {% else %}
  {% endif %}
</body>
</html>
